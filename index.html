<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WecanBR · Sistema Integrado</title>
<style>
  :root {
    --bg:        #0f1117;
    --surface:   #1a1d27;
    --surface2:  #222637;
    --surface3:  #2a2f47;
    --border:    #2e3350;
    --accent:    #14b8a6;
    --danger:    #ef4444;
    --text:      #e8eaf6;
    --muted:     #8891b4;
    --font:      'Segoe UI', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; display:flex; align-items:center; justify-content:center; }

  #login-page {
    position: fixed; inset: 0; background: radial-gradient(circle at 20% 20%, rgba(20,184,166,.08), transparent 50%), var(--bg);
    display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 24px;
  }
  .login-box { width: 420px; max-width: 100%; }
  .login-head { margin-bottom: 26px; }
  .login-head h1 { font-size: 28px; font-weight: 800; letter-spacing: 1px; }
  .login-head .subtitle-italic { color: var(--accent); font-size: 14px; font-style: italic; margin-top: 4px; }
  .demo-note { background: var(--surface2); border:1px solid var(--border); border-radius:8px; padding:10px 14px; font-size:11.5px; color:var(--muted); margin-top:18px; line-height:1.6; }
  .demo-note strong { color: var(--text); }
  .demo-note code { background: var(--surface3); padding:1px 5px; border-radius:4px; font-size:11px; }

  .field-label { font-size: 11px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .5px; font-weight:600; }
  .tipo-select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 10px 12px; font-size: 13.5px; font-family: var(--font); outline: none;
    margin-bottom: 22px; cursor: pointer;
  }
  .tipo-select:focus { border-color: var(--accent); }

  .login-form { display:none; }
  .login-form.show { display:block; }
  .login-error { background: rgba(239,68,68,.1); border: 1px solid var(--danger); color: var(--danger); padding: 9px 12px; border-radius: 8px; font-size: 12.5px; margin-bottom: 14px; display: none; }
  .selected-tipo-banner { display:flex; align-items:center; justify-content:space-between; background: var(--surface2); border:1px solid var(--border); border-radius:8px; padding:9px 13px; margin-bottom:16px; font-size:12.5px; }
  .selected-tipo-banner b { color: var(--accent); }
  .selected-tipo-banner button { background:none; border:none; color: var(--muted); font-size:11.5px; cursor:pointer; text-decoration:underline; font-family: var(--font); }

  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .4px; }
  .form-group input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 9px 12px; font-size: 13px; font-family: var(--font); outline: none;
  }
  .form-group input:focus { border-color: var(--accent); }

  .btn { padding: 9px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-family: var(--font); font-weight: 600; }
  .btn-primary { background: var(--accent); color: #06231f; width:100%; margin-top:4px; }
  .btn-primary:hover { background: #1fd6c2; }
</style>
</head>
<body>

<div id="login-page">
  <div class="login-box">
    <div class="login-head">
      <h1>WECANBR</h1>
      <p class="subtitle-italic">Sistema Integrado</p>
    </div>

    <!-- Passo 1: tipo de acesso -->
    <div id="step-tipo">
      <div class="field-label">Tipo de acesso</div>
      <select id="tipo-acesso-select" class="tipo-select" onchange="selecionarTipo(this.value)">
        <option value="" disabled selected>Selecione...</option>
        <option value="onsite">Onsite</option>
        <option value="equipe">Consultor</option>
        <option value="gestor">Gestor</option>
        <option value="master">Outro</option>
      </select>
    </div>

    <!-- Passo 2: login/senha -->
    <div class="login-form" id="step-credenciais">
      <div class="selected-tipo-banner">
        Entrando como <b id="tipo-selecionado-label">—</b>
        <button onclick="voltarParaTipo()">trocar</button>
      </div>
      <div class="login-error" id="login-error"></div>
      <div class="form-group"><label>E-mail</label><input type="email" id="login-email" placeholder="seu@wecanbr.com.br"/></div>
      <div class="form-group"><label>Senha</label><input type="password" id="login-senha" placeholder="••••••"/></div>
      <button class="btn btn-primary" onclick="fazerLogin()">Entrar</button>
    </div>

    <div class="demo-note">
      <strong>Ambiente de teste:</strong> a validação real ainda não está conectada à planilha. Contas de demonstração:<br/>
      <code>edivan.costa@wecanbr.com.br</code> / <code>Edivan027@</code> (Outro/Master) · qualquer outra conta de exemplo usa a senha <code>123456</code>.
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  USUÁRIOS DE DEMONSTRAÇÃO (mock — login real virá da planilha/Apps Script)
// ══════════════════════════════════════════════
const USUARIOS_DEMO = [
  { id:'u1', nome:'LIDIANE SILVA',  perfil:'equipe', email:'lidiane.silva@wecanbr.com.br', senha:'123456' },
  { id:'u2', nome:'FABIANA SANDER', perfil:'equipe', email:'fabiana.sander@wecanbr.com.br', senha:'123456' },
  { id:'u3', nome:'EDIVAN COSTA',   perfil:'master', email:'edivan.costa@wecanbr.com.br', senha:'Edivan027@' },
  { id:'u4', nome:'GESTORA REGIONAL', perfil:'gestor', email:'gestora.regional@wecanbr.com.br', senha:'123456' },
  { id:'u5', nome:'ONSITE DUQUE DE CAXIAS', perfil:'onsite', email:'onsite.duquedecaxias@wecanbr.com.br', senha:'123456' },
];
const PERFIL_LABEL = { equipe:'Equipe (Consultor)', gestor:'Gestor', master:'Master', onsite:'Onsite' };
let tipoSelecionado = null;

// ── Sessão persistente — mesma chave usada pelos sistemas de Admissão e Voucher.
// Hospedados sob o mesmo domínio, login feito aqui já vale nos dois.
const SESSION_KEY = 'wecan_session_v1';
const SESSION_TTL_MS = 8 * 60 * 60 * 1000; // 8 horas

function salvarSessao(s) { try { localStorage.setItem(SESSION_KEY, JSON.stringify({ session: s, savedAt: Date.now() })); } catch(e) {} }
function carregarSessaoSalva() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (!parsed.savedAt || (Date.now() - parsed.savedAt) > SESSION_TTL_MS) { localStorage.removeItem(SESSION_KEY); return null; }
    return parsed.session;
  } catch(e) { return null; }
}

function selecionarTipo(tipo) {
  if (!tipo) return;
  tipoSelecionado = tipo;
  document.getElementById('tipo-selecionado-label').textContent = PERFIL_LABEL[tipo];
  document.getElementById('step-credenciais').classList.add('show');
  document.getElementById('login-error').style.display = 'none';
  document.getElementById('login-email').focus();
}
function voltarParaTipo() {
  tipoSelecionado = null;
  document.getElementById('step-credenciais').classList.remove('show');
  document.getElementById('tipo-acesso-select').value = '';
}

function fazerLogin() {
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const senha = document.getElementById('login-senha').value;
  const err = document.getElementById('login-error');
  err.style.display = 'none';

  const conta = USUARIOS_DEMO.find(u => u.email.toLowerCase() === email);
  if (!conta || conta.senha !== senha) {
    err.textContent = 'E-mail ou senha incorretos.';
    err.style.display = 'block';
    return;
  }
  if (conta.perfil !== tipoSelecionado) {
    err.textContent = `Essa conta não corresponde ao tipo de acesso selecionado (${PERFIL_LABEL[tipoSelecionado]}). Confira e tente de novo.`;
    err.style.display = 'block';
    return;
  }
  salvarSessao(conta);
  window.location.href = 'hub.html';
}
document.addEventListener('keydown', e => {
  const step = document.getElementById('step-credenciais');
  if (e.key === 'Enter' && step && step.classList.contains('show')) fazerLogin();
});

// Se já existe sessão válida, não mostra login de novo — manda direto pro hub.
(function initApp() {
  const salva = carregarSessaoSalva();
  if (salva) window.location.href = 'hub.html';
})();
</script>
</body>
</html>
