<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WecanBR · Sistema Integrado</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #222637; --border: #2e3350;
    --accent: #14b8a6; --voucher: #4f7cff; --text: #e8eaf6; --muted: #8891b4;
    --font: 'Segoe UI', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .wrap { width: 560px; max-width: 100%; }
  .head { margin-bottom: 26px; }
  .head h1 { font-size: 24px; font-weight: 800; }
  .head p { color: var(--muted); font-size: 13px; margin-top: 6px; }
  .head b { color: var(--accent); }
  .cards { display: grid; gap: 14px; }
  .sys-card {
    display:flex; align-items:center; gap:16px; background: var(--surface); border:1px solid var(--border);
    border-radius: 14px; padding: 20px 22px; cursor:pointer; text-decoration:none; color:inherit; transition: all .15s;
  }
  .sys-card:hover { border-color: var(--accent); background: var(--surface2); transform: translateX(2px); }
  .sys-card.voucher:hover { border-color: var(--voucher); }
  .sys-ico { width:44px; height:44px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
  .sys-card:not(.voucher) .sys-ico { background: rgba(20,184,166,.12); color: var(--accent); }
  .sys-card.voucher .sys-ico { background: rgba(79,124,255,.12); color: var(--voucher); }
  .sys-info strong { display:block; font-size:15px; }
  .sys-info span { font-size:12px; color: var(--muted); }
  .empty { color: var(--muted); font-size: 13px; padding: 20px 0; }
  .logout-row { margin-top: 22px; text-align:right; }
  .btn-logout { background:none; border:1px solid var(--border); color: var(--muted); font-size: 12px; padding: 6px 14px; border-radius: 8px; cursor:pointer; font-family: var(--font); }
  .btn-logout:hover { border-color:#ef4444; color:#ef4444; }
</style>
</head>
<body>

<div class="wrap">
  <div class="head">
    <h1>Olá, <span id="nome-usuario">—</span></h1>
    <p>Tipo de acesso: <b id="perfil-usuario">—</b>. Escolha qual sistema deseja abrir.</p>
  </div>
  <div class="cards" id="cards"></div>
  <div class="logout-row"><button class="btn-logout" onclick="logout()">Sair</button></div>
</div>

<script>
const PERFIL_LABEL = { equipe:'Equipe (Consultor)', gestor:'Gestor', master:'Master', onsite:'Onsite' };
const SESSION_KEY = 'wecan_session_v1';
const SESSION_TTL_MS = 8 * 60 * 60 * 1000;

function carregarSessaoSalva() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (!parsed.savedAt || (Date.now() - parsed.savedAt) > SESSION_TTL_MS) { localStorage.removeItem(SESSION_KEY); return null; }
    return parsed.session;
  } catch(e) { return null; }
}
function logout() { try { localStorage.removeItem(SESSION_KEY); } catch(e) {} window.location.href = 'index.html'; }

const session = carregarSessaoSalva();
if (!session) {
  window.location.href = 'index.html';
} else {
  document.getElementById('nome-usuario').textContent = session.nome;
  document.getElementById('perfil-usuario').textContent = PERFIL_LABEL[session.perfil] || session.perfil;

  const cartoes = [];
  // Seleção & Admissão: todo perfil cadastrado tem acesso (a tela interna filtra o que cada um vê)
  cartoes.push({ href:'admissao.html', cls:'', ico:'◆', titulo:'Seleção & Admissão', desc:'Vagas, admissões e fila de autorização de voucher' });
  // Voucher: hoje, só Master enxerga o sistema completo a partir daqui
  if (session.perfil === 'master') {
    cartoes.push({ href:'voucher.html', cls:'voucher', ico:'🚖', titulo:'Voucher', desc:'Controle de vouchers de mobilidade — sistema integrado' });
  }

  document.getElementById('cards').innerHTML = cartoes.map(c => `
    <a class="sys-card ${c.cls}" href="${c.href}">
      <div class="sys-ico">${c.ico}</div>
      <div class="sys-info"><strong>${c.titulo}</strong><span>${c.desc}</span></div>
    </a>`).join('') || '<div class="empty">Nenhum sistema disponível para este tipo de acesso.</div>';
}
</script>
</body>
</html>
